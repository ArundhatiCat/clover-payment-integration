<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clover Payment Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Clover Payment Demo</h1>
        <p>Secure payments powered by Clover</p>
      </div>

      <!-- Auth Section -->
      <div id="auth-section" class="card">
        <h2>Step 1: Connect with Clover</h2>
        <p>You need to authenticate with your Clover merchant account before processing payments.</p>
        <button id="auth-btn" onclick="connectClover()">Connect with Clover</button>
        <div id="auth-status" class="status-badge"></div>
      </div>

      <!-- Payment Form -->
      <div id="payment-section" class="card hidden">
        <h2>Step 2: Make a Payment</h2>
        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input
            type="number"
            id="amount"
            placeholder="Enter amount (e.g. 10.00)"
            min="0.01"
            step="0.01"
          />
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <input
            type="text"
            id="description"
            placeholder="Enter product or service name"
          />
        </div>
        <button id="pay-btn" onclick="processPayment()">Pay Now</button>
      </div>

      <!-- Result Section -->
      <div id="result-section" class="card hidden">
        <h2>Payment Result</h2>
        <div id="result-content"></div>
        <button onclick="resetForm()">Make Another Payment</button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
